        '403': { $ref: '#/components/responses/Forbidden' }

  # Admin – Group Deletion Requests
  /admin/group-deletion-requests:
    get:
      tags: [Admin]
      summary: "[Admin] List all group deletion requests"
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/RequestStatus' }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Group deletion requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/GroupDeletionRequest' } }
                  meta: { $ref: '#/components/schemas/PaginatedMeta' }
              example:
                data:
                  - requestId: "gdr1b2c3-0001-0001-0001-000000000001"
                    groupId: "g1b2c3d4-0001-0001-0001-000000000001"
                    reason: "Group is no longer active."
                    status: "PENDING"
                    createdAt: "2026-02-26T10:00:00Z"
                    reviewedAt: null
                meta:
                  page: 1
                  limit: 20
                  total: 3
                  totalPages: 1
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/group-deletion-requests/{requestId}/approve:
    post:
      tags: [Admin]
      summary: "[Admin] Approve a group deletion request"
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Deletion request approved — group will be deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GroupDeletionRequest' }
              example:
                requestId: "gdr1b2c3-0001-0001-0001-000000000001"
                groupId: "g1b2c3d4-0001-0001-0001-000000000001"
                reason: "Group is no longer active."
                status: "APPROVED"
                createdAt: "2026-02-26T10:00:00Z"
                reviewedAt: "2026-02-26T12:00:00Z"
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/group-deletion-requests/{requestId}/reject:
    post:
      tags: [Admin]
      summary: "[Admin] Reject a group deletion request"
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rejectionReason]
              properties:
                rejectionReason: { type: string }
            example:
              rejectionReason: "The group is still active and has members."
      responses:
        '200':
          description: Deletion request rejected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GroupDeletionRequest' }
              example:
                requestId: "gdr1b2c3-0001-0001-0001-000000000001"
                groupId: "g1b2c3d4-0001-0001-0001-000000000001"
                reason: "Group is no longer active."
                status: "REJECTED"
                createdAt: "2026-02-26T10:00:00Z"
                reviewedAt: "2026-02-26T12:00:00Z"
        '403': { $ref: '#/components/responses/Forbidden' }

  # Admin – Group Moderation Reports
  /admin/group-moderation:
    get:
      tags: [Admin]
      summary: "[Admin] Review reported groups"
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [PENDING, UNDER_REVIEW, RESOLVED] }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Reported groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/GroupModeration' } }
                  meta: { $ref: '#/components/schemas/PaginatedMeta' }
              example:
                data:
                  - moderationId: "gm1b2c3d-0001-0001-0001-000000000001"
                    groupId: "g2c3d4e5-0002-0002-0002-000000000002"
                    reportedBy:
                      userId: "b2c3d4e5-0002-0002-0002-000000000002"
                      firstName: "Bob"
                      lastName: "Smith"
                      profilePicture: "https://cdn.facebook-isd.io/avatars/bob.jpg"
                      isActive: true
                    reason: "Group promotes harmful ideologies."
                    severity: "HIGH"
                    status: "PENDING"
                    reportedAt: "2026-02-25T16:00:00Z"
                    reviewedAt: null
                meta:
                  page: 1
                  limit: 20
                  total: 2
                  totalPages: 1
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/group-moderation/{moderationId}/resolve:
    post:
      tags: [Admin]
      summary: "[Admin] Resolve a group moderation report"
      parameters:
        - name: moderationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { $ref: '#/components/schemas/GroupModerationAction' }
            example:
              action: "WARN_ADMIN"
      responses:
        '200':
          description: Group moderation resolved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GroupModeration' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # Admin – Analytics
  /admin/analytics/moderation:
    get:
      tags: [Admin]
      summary: "[Admin] Get moderation dashboard analytics"
      description: Returns `ModerationAnalytics` — KPIs, violation trends, content safety patterns, top violating users.
      responses:
        '200':
          description: Moderation analytics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationAnalytics' }
              example:
                analyticsId: "an1b2c3d-0001-0001-0001-000000000001"
                totalFlags: 142
                resolvedFlags: 128
                pendingFlags: 14
                totalBans: 38
                activeBans: 12
                totalViolations: 95
                topViolationTypes:
                  - type: "HATE_SPEECH"
                    count: 41
                  - type: "SPAM"
                    count: 28
                  - type: "HARASSMENT"
                    count: 19
                reportPeriod:
                  from: "2026-02-01T00:00:00Z"
                  to:   "2026-02-26T23:59:59Z"
                lastUpdated: "2026-02-26T12:00:00Z"
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/analytics/system:
    get:
      tags: [Admin]
      summary: "[Admin] Get system statistics"
      responses:
        '200':
          description: System stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalUsers:   { type: integer, example: 52430 }
                  activeUsers:  { type: integer, example: 48201 }
                  totalPosts:   { type: integer, example: 312900 }
                  totalGroups:  { type: integer, example: 4820 }
                  totalReports: { type: integer, example: 142 }
                  uptime:       { type: string, example: "99.97%" }
                  lastUpdated:  { type: string, format: date-time, example: "2026-02-26T12:00:00Z" }
        '403': { $ref: '#/components/responses/Forbidden' }
