openapi: 3.0.3
info:
  title: Facebook API
  description: |
    RESTful API for **Facebook** — a social media platform built for **CSE 326: Information System Design**.

    Covers authentication, user profiles, posts, reactions, comments, friend graph, groups,
    news feed, notifications, content moderation, bans, violations, and admin workflows.

    > All enums match the class diagram exactly (e.g. `Visibility`, `ReactionType`, `FriendshipStatus`, etc.)
  version: 1.0.0
  contact:
    name: RudraShivm
    url: https://github.com/RudraShivm/CSE-326-Information-System-Design
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server
  - url: https://api.facebook-isd.io/v1
    description: Production Server

tags:
  - name: Auth
    description: Registration, login, and token management
  - name: Users
    description: User profiles and account settings
  - name: Friends
    description: Friend requests, suggestions, and friendship management
  - name: Posts
    description: Create, retrieve, update, and delete posts
  - name: Comments
    description: Comment threads on posts
  - name: Reactions
    description: Emoji reactions on posts and comments
  - name: Feed
    description: Personalized news feed (ranking + recommendation engine)
  - name: Groups
    description: Group creation, membership, and posts
  - name: Notifications
    description: Real-time notification management
  - name: Moderation
    description: Content flagging and reporting
  - name: Admin
    description: Admin-only moderation, bans, violations, and analytics

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────────────────────
security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from `/auth/login`

  # ─── REUSABLE EXAMPLES ───────────────────────────────────────────────────────
  examples:

    UserSummaryExample:
      value:
        userId: "a1b2c3d4-0001-0001-0001-000000000001"
