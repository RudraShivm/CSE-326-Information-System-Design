    patch:
      tags: [Users]
      summary: Update current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileRequest' }
            example:
              bio: "Passionate about building scalable systems 🛠️"
              firstName: "Alice"
              lastName: "Johnson"
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
              examples:
                default: { $ref: '#/components/examples/UserProfileExample' }
