  # ── MODERATION (User-facing) ──────────────────────────────────────────────────
  /content/report:
    post:
      tags: [Moderation]
      summary: Report content (post, comment, group post, or profile)
      description: Creates a `ContentFlag` in the system that enters the admin moderation queue.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportRequest' }
            example:
              contentType: "POST"
              contentId: "p1b2c3d4-0001-0001-0001-000000000001"
              violationType: "HATE_SPEECH"
              description: "This post contains targeted hate speech against a community."
      responses:
        '201':
          description: Report submitted — content flag created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentFlag' }
              examples:
                default: { $ref: '#/components/examples/ContentFlagExample' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── ADMIN ─────────────────────────────────────────────────────────────────────

  # Admin – Content Flags & Decisions
  /admin/flags:
    get:
      tags: [Admin]
      summary: "[Admin] Get flagged content queue"
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/FlagStatus' }
        - name: priority
          in: query
          schema: { $ref: '#/components/schemas/ContentFlagPriority' }
        - name: contentType
          in: query
          schema: { $ref: '#/components/schemas/ContentType' }
        - name: prioritySort
          in: query
          schema: { type: boolean, default: true }
          description: Sort by AI score and priority descending
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Flagged content queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/ContentFlag' } }
                  meta: { $ref: '#/components/schemas/PaginatedMeta' }
              example:
                data:
                  - flagId: "fl1b2c3d-0001-0001-0001-000000000001"
                    contentId: "p1b2c3d4-0001-0001-0001-000000000001"
                    contentType: "POST"
                    flaggedBy:
                      userId: "b2c3d4e5-0002-0002-0002-000000000002"
                      firstName: "Bob"
                      lastName: "Smith"
                      profilePicture: "https://cdn.facebook-isd.io/avatars/bob.jpg"
                      isActive: true
                    aiScore: 0.82
                    priority: "HIGH"
                    status: "PENDING"
                    createdAt: "2026-02-25T16:00:00Z"
                    reviewedAt: null
                meta:
                  page: 1
                  limit: 20
                  total: 14
                  totalPages: 1
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/flags/{flagId}/decide:
    post:
      tags: [Admin]
      summary: "[Admin] Make a moderation decision on a content flag"
      parameters:
        - $ref: '#/components/parameters/FlagId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, reason]
              properties:
                decision: { $ref: '#/components/schemas/ModerationAction' }
                reason:   { type: string, maxLength: 500 }
            example:
              decision: "DELETE"
              reason: "Content clearly violates community guidelines on hate speech."
      responses:
        '200':
          description: Moderation decision recorded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationDecision' }
              example:
                decisionId: "md1b2c3d-0001-0001-0001-000000000001"
                contentId: "p1b2c3d4-0001-0001-0001-000000000001"
                contentType: "POST"
                decision: "DELETE"
                reason: "Content clearly violates community guidelines on hate speech."
                aiScore: 0.82
                decidedAt: "2026-02-26T09:00:00Z"
        '403': { $ref: '#/components/responses/Forbidden' }

