    NotFoundExample:
      value:
        code: "NOT_FOUND"
        message: "The requested resource was not found."

  # ─── SCHEMAS ─────────────────────────────────────────────────────────────────
  schemas:

    # ── Enums (matching class diagram exactly) ────────────────────────────────

    Visibility:
      type: string
      enum: [PUBLIC, FRIENDS, PRIVATE]
      description: Post visibility level

    ReactionType:
      type: string
      enum: [LIKE, LOVE, HAHA, WOW, SAD, ANGRY]

    FriendshipStatus:
      type: string
      enum: [PENDING, ACCEPTED, BLOCKED, DECLINED]

    GroupPrivacy:
      type: string
      enum: [PUBLIC, PRIVATE]

    NotificationType:
      type: string
      enum: [FRIEND_REQUEST, POST_LIKE, POST_COMMENT, GROUP_INVITE, SYSTEM_ALERT]

    RequestStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    ViolationType:
      type: string
      enum: [HATE_SPEECH, HARASSMENT, SPAM, MISINFORMATION, INAPPROPRIATE_CONTENT, COPYRIGHT_VIOLATION, THREAT, OTHER]

    ModerationAction:
      type: string
      enum: [APPROVE, DELETE, WARN, BAN_TEMPORARY, BAN_PERMANENT, ESCALATE]

    ContentType:
      type: string
      enum: [POST, COMMENT, MESSAGE, GROUP_POST, PROFILE_CONTENT]

    FlagStatus:
      type: string
      enum: [PENDING, UNDER_REVIEW, RESOLVED, ESCALATED]

    ContentFlagPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    BanType:
      type: string
      enum: [FINAL_WARNING, TEMPORARY_7_DAYS, TEMPORARY_30_DAYS, TEMPORARY_90_DAYS, PERMANENT]

    GroupModerationAction:
      type: string
      enum: [DISMISS, WARN_ADMIN, REMOVE_ADMIN, DISABLE_GROUP, DELETE_GROUP]

    AdminRole:
      type: string
      enum: [SUPER_ADMIN, MODERATOR, CONTENT_REVIEWER]

    # ── Core Entity Schemas ───────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName, dateOfBirth]
      properties:
        email:       { type: string, format: email, example: "alice@example.com" }
        password:    { type: string, format: password, minLength: 8, example: "Secur3P@ss" }
        firstName:   { type: string, example: "Alice" }
        lastName:    { type: string, example: "Johnson" }
        dateOfBirth: { type: string, format: date, example: "1998-06-15" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email, example: "alice@example.com" }
        password: { type: string, format: password, example: "Secur3P@ss" }

    AuthResponse:
      type: object
      properties:
        accessToken:  { type: string }
        refreshToken: { type: string }
        expiresIn:    { type: integer, description: "Seconds until access token expires" }
        user:         { $ref: '#/components/schemas/UserSummary' }

    UserSummary:
      type: object
      description: Lightweight user representation for embedding
      properties:
        userId:         { type: string, format: uuid }
        firstName:      { type: string }
        lastName:       { type: string }
        profilePicture: { type: string, format: uri, nullable: true }
        isActive:       { type: boolean }

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          properties:
            email:            { type: string, format: email }
            bio:              { type: string, nullable: true }
            dateOfBirth:      { type: string, format: date }
            createdAt:        { type: string, format: date-time }
            updatedAt:        { type: string, format: date-time }
            friendshipStatus:
              oneOf:
                - $ref: '#/components/schemas/FriendshipStatus'
              nullable: true

    UpdateProfileRequest:
      type: object
      properties:
        firstName:      { type: string, example: "Alice" }
        lastName:       { type: string, example: "Johnson" }
        bio:            { type: string, example: "Passionate about building scalable systems." }
        profilePicture: { type: string, format: uri }

    Friendship:
      type: object
      properties:
        friendshipId: { type: string, format: uuid }
        requester:    { $ref: '#/components/schemas/UserSummary' }
        receiver:     { $ref: '#/components/schemas/UserSummary' }
        status:       { $ref: '#/components/schemas/FriendshipStatus' }
        createdAt:    { type: string, format: date-time }
        acceptedAt:   { type: string, format: date-time, nullable: true }

    FriendSuggestion:
      type: object
      properties:
        user:          { $ref: '#/components/schemas/UserSummary' }
        mutualFriends: { type: integer }
        reason:
          type: string
          enum: [mutual_friends, same_location, graph_proximity]

    Post:
      type: object
      properties:
        postId:       { type: string, format: uuid }
        author:       { $ref: '#/components/schemas/UserSummary' }
        content:      { type: string }
        imageUrl:     { type: string, format: uri, nullable: true }
        videoUrl:     { type: string, format: uri, nullable: true }
        visibility:   { $ref: '#/components/schemas/Visibility' }
        likeCount:    { type: integer }
        commentCount: { type: integer }
        shareCount:   { type: integer }
        myReaction:
          oneOf:
            - $ref: '#/components/schemas/ReactionType'
          nullable: true
        createdAt:    { type: string, format: date-time }
        updatedAt:    { type: string, format: date-time }

    CreatePostRequest:
      type: object
      required: [content]
      properties:
        content:    { type: string }
        visibility:
          allOf:
            - $ref: '#/components/schemas/Visibility'
          default: FRIENDS
        imageUrl:   { type: string, format: uri, nullable: true }
        videoUrl:   { type: string, format: uri, nullable: true }

    UpdatePostRequest:
      type: object
      properties:
        content:    { type: string }
        visibility: { $ref: '#/components/schemas/Visibility' }

    Comment:
      type: object
      properties:
        commentId:  { type: string, format: uuid }
        postId:     { type: string, format: uuid }
        author:     { $ref: '#/components/schemas/UserSummary' }
        content:    { type: string }
        createdAt:  { type: string, format: date-time }
        updatedAt:  { type: string, format: date-time }

    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }

    UpdateCommentRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }

    ReactionRequest:
      type: object
      required: [type]
      properties:
        type: { $ref: '#/components/schemas/ReactionType' }

    ReactionSummary:
      type: object
      properties:
        total:     { type: integer }
        breakdown:
          type: object
          properties:
            LIKE:  { type: integer }
            LOVE:  { type: integer }
            HAHA:  { type: integer }
            WOW:   { type: integer }
            SAD:   { type: integer }
            ANGRY: { type: integer }

    FeedResponse:
      type: object
      properties:
        posts:      { type: array, items: { $ref: '#/components/schemas/Post' } }
        nextCursor: { type: string, nullable: true }
        hasMore:    { type: boolean }

    Group:
      type: object
      properties:
        groupId:     { type: string, format: uuid }
        name:        { type: string }
        description: { type: string }
        privacy:     { $ref: '#/components/schemas/GroupPrivacy' }
        memberCount: { type: integer }
        createdAt:   { type: string, format: date-time }

    CreateGroupRequest:
      type: object
      required: [name]
      properties:
        name:        { type: string, example: "CSE 326 Study Group" }
        description: { type: string, example: "Discussion for ISD course." }
        privacy:
          allOf:
            - $ref: '#/components/schemas/GroupPrivacy'
          default: PUBLIC

    UpdateGroupRequest:
      type: object
      properties:
        name:        { type: string }
        description: { type: string }
        privacy:     { $ref: '#/components/schemas/GroupPrivacy' }

    GroupDeletionRequest:
      type: object
      properties:
        requestId:  { type: string, format: uuid }
        groupId:    { type: string, format: uuid }
        reason:     { type: string }
        status:     { $ref: '#/components/schemas/RequestStatus' }
        createdAt:  { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time, nullable: true }

    Notification:
      type: object
      properties:
        notificationId: { type: string, format: uuid }
        type:           { $ref: '#/components/schemas/NotificationType' }
        title:          { type: string }
        message:        { type: string }
        isRead:         { type: boolean }
        createdAt:      { type: string, format: date-time }

    ContentFlag:
      type: object
      properties:
        flagId:      { type: string, format: uuid }
        contentId:   { type: string, format: uuid }
        contentType: { $ref: '#/components/schemas/ContentType' }
        flaggedBy:   { $ref: '#/components/schemas/UserSummary' }
        aiScore:     { type: number, format: double, minimum: 0, maximum: 1 }
        priority:    { $ref: '#/components/schemas/ContentFlagPriority' }
        status:      { $ref: '#/components/schemas/FlagStatus' }
        createdAt:   { type: string, format: date-time }
        reviewedAt:  { type: string, format: date-time, nullable: true }

    ReportRequest:
      type: object
      required: [contentType, contentId, violationType]
      properties:
        contentType:   { $ref: '#/components/schemas/ContentType' }
        contentId:     { type: string, format: uuid }
        violationType: { $ref: '#/components/schemas/ViolationType' }
        description:   { type: string, maxLength: 500 }

    ModerationDecision:
      type: object
      properties:
        decisionId:   { type: string, format: uuid }
        contentId:    { type: string, format: uuid }
        contentType:  { $ref: '#/components/schemas/ContentType' }
        decision:     { $ref: '#/components/schemas/ModerationAction' }
        reason:       { type: string }
        aiScore:      { type: number, format: double }
        decidedAt:    { type: string, format: date-time }

    Violation:
      type: object
      properties:
        violationId:   { type: string, format: uuid }
        userId:        { type: string, format: uuid }
        violationType: { $ref: '#/components/schemas/ViolationType' }
        severity:      { type: integer, minimum: 1, maximum: 5 }
        contentId:     { type: string, format: uuid, nullable: true }
        description:   { type: string }
        issuedAt:      { type: string, format: date-time }
        expiresAt:     { type: string, format: date-time, nullable: true }

    BanRecord:
      type: object
      properties:
        banId:          { type: string, format: uuid }
        userId:         { type: string, format: uuid }
        banType:        { $ref: '#/components/schemas/BanType' }
        reason:         { type: string }
        violationCount: { type: integer }
        issuedAt:       { type: string, format: date-time }
        expiresAt:      { type: string, format: date-time, nullable: true }
        isActive:       { type: boolean }

    ApplyBanRequest:
      type: object
      required: [banType, reason]
      properties:
        banType: { $ref: '#/components/schemas/BanType' }
        reason:  { type: string, example: "Repeated hate speech violations." }

    GroupModeration:
      type: object
      properties:
        moderationId: { type: string, format: uuid }
        groupId:      { type: string, format: uuid }
        reportedBy:   { $ref: '#/components/schemas/UserSummary' }
        reason:       { type: string }
        severity:     { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
        status:       { type: string, enum: [PENDING, UNDER_REVIEW, RESOLVED] }
        reportedAt:   { type: string, format: date-time }
        reviewedAt:   { type: string, format: date-time, nullable: true }

    ModerationAnalytics:
      type: object
      properties:
        analyticsId:       { type: string, format: uuid }
        totalFlags:        { type: integer }
        resolvedFlags:     { type: integer }
        pendingFlags:      { type: integer }
        totalBans:         { type: integer }
        activeBans:        { type: integer }
        totalViolations:   { type: integer }
        topViolationTypes:
          type: array
          items:
            type: object
            properties:
              type:  { $ref: '#/components/schemas/ViolationType' }
              count: { type: integer }
        reportPeriod:
          type: object
          properties:
            from: { type: string, format: date-time }
            to:   { type: string, format: date-time }
        lastUpdated:       { type: string, format: date-time }

    PaginatedMeta:
      type: object
      properties:
        page:       { type: integer, example: 1 }
        limit:      { type: integer, example: 20 }
        total:      { type: integer, example: 250 }
        totalPages: { type: integer, example: 13 }

    ErrorResponse:
      type: object
      properties:
        code:    { type: string }
        message: { type: string }

  # ─── RESPONSES ───────────────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            default: { $ref: '#/components/examples/UnauthorizedExample' }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            default: { $ref: '#/components/examples/ForbiddenExample' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            default: { $ref: '#/components/examples/NotFoundExample' }

  # ─── PARAMETERS ──────────────────────────────────────────────────────────────
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
      example: "a1b2c3d4-0001-0001-0001-000000000001"
    PostId:
      name: postId
      in: path
      required: true
      schema: { type: string, format: uuid }
      example: "p1b2c3d4-0001-0001-0001-000000000001"
    CommentId:
      name: commentId
      in: path
      required: true
      schema: { type: string, format: uuid }
      example: "c1b2c3d4-0001-0001-0001-000000000001"
    GroupId:
      name: groupId
      in: path
      required: true
      schema: { type: string, format: uuid }
      example: "g1b2c3d4-0001-0001-0001-000000000001"
    FlagId:
      name: flagId
      in: path
      required: true
      schema: { type: string, format: uuid }
      example: "fl1b2c3d-0001-0001-0001-000000000001"
    BanId:
      name: banId
      in: path
      required: true
      schema: { type: string, format: uuid }
      example: "ban1b2c3-0001-0001-0001-000000000001"
    RequestId:
      name: requestId
      in: path
      required: true
      schema: { type: string, format: uuid }
      example: "gdr1b2c3-0001-0001-0001-000000000001"
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── AUTH ─────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
            example:
              email: "alice@example.com"
              password: "Secur3P@ss"
              firstName: "Alice"
              lastName: "Johnson"
              dateOfBirth: "1998-06-15"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhMWIyYzNkNCIsImlhdCI6MTc0MDQ4MDAwMH0.abc123"
                refreshToken: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4xMjM0NTY3ODk="
                expiresIn: 3600
                user:
                  userId: "a1b2c3d4-0001-0001-0001-000000000001"
                  firstName: "Alice"
                  lastName: "Johnson"
                  profilePicture: null
                  isActive: true
        '409':
          description: Email already in use
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                code: "EMAIL_CONFLICT"
                message: "An account with this email address already exists."

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
            example:
              email: "alice@example.com"
              password: "Secur3P@ss"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhMWIyYzNkNCIsImlhdCI6MTc0MDQ4MDAwMH0.abc123"
                refreshToken: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4xMjM0NTY3ODk="
                expiresIn: 3600
                user:
                  userId: "a1b2c3d4-0001-0001-0001-000000000001"
                  firstName: "Alice"
                  lastName: "Johnson"
                  profilePicture: "https://cdn.facebook-isd.io/avatars/alice.jpg"
                  isActive: true
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                code: "INVALID_CREDENTIALS"
                message: "The email or password is incorrect."

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and invalidate tokens
      responses:
        '204': { description: Logged out successfully }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
            example:
              refreshToken: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4xMjM0NTY3ODk="
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhMWIyYzNkNCIsImlhdCI6MTc0MDQ4MzYwMH0.xyz789"
                refreshToken: "dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4xMjM0NTY3ODk="
                expiresIn: 3600
                user:
                  userId: "a1b2c3d4-0001-0001-0001-000000000001"
                  firstName: "Alice"
                  lastName: "Johnson"
                  profilePicture: "https://cdn.facebook-isd.io/avatars/alice.jpg"
                  isActive: true
        '401': { $ref: '#/components/responses/Unauthorized' }

